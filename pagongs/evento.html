<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evento - Voluncheer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="ongstyle.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../img/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .evento-detalhe {
      max-width: 820px;
      margin: 40px auto 60px;
      padding: 0 20px;
      font-family: 'Poppins', sans-serif;
    }
    .btn-voltar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px solid #1C2567;
      color: #1C2567;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 24px;
      font-family: 'Poppins', sans-serif;
      transition: all .2s;
    }
    .btn-voltar:hover { background: #1C2567; color: #fff; }

    .evento-capa {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 28px;
      display: block;
    }
    .evento-categoria-badge {
      display: inline-block;
      background: #72A2ED;
      color: #fff;
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .evento-titulo-detalhe {
      font-size: 28px;
      font-weight: 700;
      color: #1C2567;
      margin-bottom: 6px;
      line-height: 1.25;
    }
    .evento-ong-nome {
      font-size: 15px;
      color: #72A2ED;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .evento-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .evento-meta-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #555;
      font-size: 14px;
    }
    .evento-meta-item i { font-size: 18px; color: #72A2ED; }
    .evento-desc {
      font-size: 16px;
      color: #333;
      line-height: 1.75;
      white-space: pre-line;
    }
    .loading-detalhe {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-family: 'Poppins', sans-serif;
    }
    .erro-detalhe {
      text-align: center;
      padding: 60px 20px;
      color: #c0392b;
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body>
  <section class="PrimeiroFundo">
    <header class="headerclass">
      <div class="titulo">
        <a href="../index.html">
          <img src="../img/LOGO-09.png" alt="Logo Voluncheer">
        </a>
      </div>
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Abrir menu">
        <i class="bi bi-list"></i>
      </button>
      <div class="menu-content" id="menuContent">
        <nav class="opcoes">
          <ul>
            <li><a href="../index.html">HOME</a></li>
            <li><a href="../pagsobre/sobre.html">SOBRE</a></li>
            <li><a href="../pagongs/ongs.html">ONG'S</a></li>
            <li><a href="../pagcontato/contatos.html">CONTATO</a></li>
          </ul>
        </nav>
        <div class="perfil">
          <a href="../login/login.html">
            <button><i class="bi bi-person"></i></button>
          </a>
        </div>
      </div>
    </header>
  </section>

  <main class="evento-detalhe" id="conteudoEvento">
    <p class="loading-detalhe">Carregando evento...</p>
  </main>

  <footer>
    <section class="footer-container">
      <div class="logo-voluncheer"><a href="../index.html"><img src="../img/LOGO-02.png" alt=""></a></div>
      <div class="social-logos">
        <a href="https://www.facebook.com/?locale=pt_BR" target="_blank"><i class="bi bi-facebook"></i></a>
        <a href="https://www.youtube.com/" target="_blank"><i class="bi bi-youtube"></i></a>
        <a href="https://www.instagram.com/" target="_blank"><i class="bi bi-instagram"></i></a>
      </div>
      <div class="footer-column">
        <h4>Menu</h4>
        <ul class="footer-links">
          <li><a href="../index.html">Home</a></li>
          <li><a href="../pagsobre/sobre.html">Sobre</a></li>
          <li><a href="../pagongs/ongs.html">ONG's</a></li>
          <li><a href="../pagcontato/contatos.html">Contato</a></li>
        </ul>
      </div>
    </section>
    <div class="footer-bottom"><p>&copy; 2025 Voluncheer. Todos os direitos reservados.</p></div>
  </footer>

  <script src="../auth.js"></script>
  <script src="ong.js"></script>
  <script>
    const API = 'https://projeto-voluncheer-production-db39.up.railway.app'

    const categoriasLabel = {
      saude: 'Saúde', animais: 'Animais', comida: 'Combate à Fome',
      idosos: 'Idosos', reciclagem: 'Reciclagem', coleta: 'Coleta de Lixo'
    }

    function formatarData(dataStr) {
      const [y, m, d] = dataStr.split('-')
      return `${d}/${m}/${y}`
    }

    async function carregarEvento() {
      const params = new URLSearchParams(window.location.search)
      const id = params.get('id')
      const conteudo = document.getElementById('conteudoEvento')

      if (!id) {
        conteudo.innerHTML = '<p class="erro-detalhe">ID do evento não informado. <a href="ongs.html">Voltar</a></p>'
        return
      }

      try {
        const res = await fetch(`${API}/eventos/${id}`)
        if (!res.ok) throw new Error('not found')
        const ev = await res.json()

        document.title = `${ev.titulo} - Voluncheer`

        conteudo.innerHTML = `
          <a href="ongs.html" class="btn-voltar"><i class="bi bi-arrow-left"></i> Voltar aos eventos</a>
          <img 
            src="${ev.imagem}" 
            class="evento-capa" 
            alt="${ev.titulo}"
            onerror="this.src='../img/home/filtro/saudef.png'"
          >
          <span class="evento-categoria-badge">${categoriasLabel[ev.categoria] || ev.categoria}</span>
          <h1 class="evento-titulo-detalhe">${ev.titulo}</h1>
          <p class="evento-ong-nome"><i class="bi bi-building"></i> ${ev.ongNome}</p>
          <div class="evento-meta">
            <div class="evento-meta-item">
              <i class="bi bi-calendar-event"></i>
              <span>${formatarData(ev.data)}</span>
            </div>
            <div class="evento-meta-item">
              <i class="bi bi-clock"></i>
              <span>${ev.horario}</span>
            </div>
          </div>
          <p class="evento-desc">${ev.descricao}</p>
        `
      } catch {
        conteudo.innerHTML = `
          <a href="ongs.html" class="btn-voltar"><i class="bi bi-arrow-left"></i> Voltar</a>
          <p class="erro-detalhe">Evento não encontrado ou servidor offline.</p>
        `
      }
    }

    carregarEvento()
  </script>
</body>
</html>
